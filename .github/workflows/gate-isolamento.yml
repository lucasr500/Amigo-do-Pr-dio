name: Gate de Isolamento (RLS multi-tenant)

# Prova, contra um Postgres real, que um membro do condomínio B não lê nem escreve
# dados do condomínio A (RLS das migrations 005/006/007). O runner do GitHub tem
# Docker nativo, então o Supabase local sobe aqui sem depender da máquina do Lucas.
# Verde = isolamento provado e guardado: se uma futura mudança quebrar a RLS, este
# job falha e bloqueia o merge. Nada toca produção — stack 100% local e descartável.

on:
  push:
    paths:
      - "lib/**"
      - "supabase/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/gate-isolamento.yml"
  pull_request:
    paths:
      - "lib/**"
      - "supabase/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/gate-isolamento.yml"
  workflow_dispatch: {}

concurrency:
  group: gate-isolamento-${{ github.ref }}
  cancel-in-progress: true

jobs:
  isolation-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22+ expõe WebSocket global, exigido pelo @supabase/realtime-js ao
          # construir o client no teste de isolamento. Node 20 falha em createClient.
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Versão fixada (não "latest"): evita a chamada "resolve latest release"
          # à API do GitHub, que rate-limita sem token e derrubou o run anterior.
          version: 2.107.0

      # supabase init cria o config.toml efêmero do runner (sem Docker).
      # Idempotente: só inicializa se o repo ainda não tiver config.toml versionado.
      - name: Inicializar projeto Supabase (se necessário)
        run: |
          if [ ! -f supabase/config.toml ]; then
            supabase init
          fi

      # supabase start sobe o stack local (Postgres + Auth + REST) e aplica as
      # migrations 001→007. db reset garante uma aplicação limpa e determinística.
      - name: Subir Supabase local + aplicar migrations
        run: |
          supabase start
          supabase db reset

      # Exporta as chaves do stack LOCAL (127.0.0.1) para os nomes que o teste lê.
      # eval resolve as aspas do output; reescrevemos sem aspas no $GITHUB_ENV.
      - name: Exportar chaves do Supabase local
        run: |
          eval "$(supabase status -o env)"
          {
            echo "SUPABASE_TEST_URL=$API_URL"
            echo "SUPABASE_TEST_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_TEST_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      # DIAGNÓSTICO TEMPORÁRIO (lane CI): reproduz o setup do teste via REST com a
      # service_role e emite a resposta crua do PostgREST como annotation (::error::/
      # ::notice::), que é legível pela API pública. Serve para descobrir por que o
      # insert em condominios voltou data:null no beforeAll. Remover após o gate verde.
      - name: Diagnóstico — setup do gate (service role → condominios)
        run: |
          eval "$(supabase status -o env)"
          EMAIL="diag-${GITHUB_RUN_ID}@test.local"
          URESP=$(curl -sS -X POST "$API_URL/auth/v1/admin/users" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"diag-123456\",\"email_confirm\":true}")
          DIAG_UID=$(echo "$URESP" | jq -r '.id // empty')
          echo "::notice::DIAG createUser id=${DIAG_UID:-VAZIO} resp=$(echo "$URESP" | head -c 300)"
          CRESP=$(curl -sS -X POST "$API_URL/rest/v1/condominios" \
            -H "apikey: $SERVICE_ROLE_KEY" -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" -H "Prefer: return=representation" \
            -d "{\"owner_id\":\"$DIAG_UID\",\"nome\":\"diag\"}")
          echo "::error::DIAG condominios insert resp=$(echo "$CRESP" | head -c 600)"

      - name: GATE — isolamento entre condomínios (4 testes)
        run: npx vitest run lib/__tests__/tenant-isolation.integration.test.ts

      - name: Regressão — tsc + suíte completa
        run: |
          npx tsc --noEmit
          npx vitest run

      - name: Parar Supabase
        if: always()
        run: supabase stop || true
